; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:gci]
platform = espressif32
board = esp32dev
framework = arduino
build_flags =
		-Os                        # Optimize for size (not -O2)
		-ffunction-sections        # Put functions in separate sections
		-fdata-sections            # Put data in separate sections
		-Wl,--gc-sections          # Remove unused sections
		-DCORE_DEBUG_LEVEL=0       # Remove debug strings
extra_scripts =
	post:scripts/autoincrement.py
	post:scripts/combine_bins.py
lib_deps = 
	bodmer/TFT_eSPI@^2.5.43
	paulstoffregen/OneWire@^2.3.8
	milesburton/DallasTemperature@^4.0.5
monitor_speed = 115200
monitor_port = COM5
upload_port = COM5
